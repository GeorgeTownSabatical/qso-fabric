version: "3.9"

services:
  tor:
    image: dperson/torproxy
    restart: unless-stopped
    ports:
      - "9050:9050"
    volumes:
      - ./torrc:/etc/tor/torrc:ro

  qso-node:
    image: qso-fabric:latest
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile.solis
    depends_on:
      - tor
    environment:
      QSO_TRANSPORT_STATE_PATH: /var/lib/qso/state/transport_state.json
      QSO_NETWORK_AUDIT_PATH: /var/lib/qso/state/network_audit.jsonl
      QSO_TRANSPORT_POLICY_VERSION: v1
      QSO_TRANSPORT_MODE: tor
      QSO_TOR_SOCKS_HOST: tor
      QSO_TOR_SOCKS_PORT: "9050"
    volumes:
      - qso_data:/var/lib/qso

volumes:
  qso_data:
