name: xr-determinism-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  xr-determinism:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint XR surfaces
        run: |
          ruff check qso_xr tools tests

      - name: XR determinism and replay gates
        run: |
          pytest -q \
            tests/test_qso_xr_registry.py \
            tests/test_qso_xr_demo_examples.py \
            tests/test_qso_xr_runtime.py \
            tests/test_qso_xr_knowledge_lattice.py \
            tests/test_qso_xr_golden_hashes.py \
            tests/test_qso_xr_determinism_pipeline.py \
            tests/test_qso_xr_scene_director.py \
            tests/test_qso_xr_dev_cli.py \
            tests/test_webxr_adapter.py \
            tests/test_scene_render_projector.py
