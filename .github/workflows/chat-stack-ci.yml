name: chat-stack-ci

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  chat-stack-verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'

      - name: Lint chat/mcp surfaces
        run: ruff check mcp_qso_edu tools tests

      - name: Run chat and MCP tests
        run: |
          pytest -q \
            tests/test_mcp_qso_edu.py \
            tests/test_mcp_qso_edu_protocol.py \
            tests/test_sandbox_mcp_compat.py \
            tests/test_conversation_bridge.py \
            tests/test_qso_chat.py \
            tests/test_plus_bridge_https.py

      - name: Runtime smoke
        run: python tools/smoke_chat_stack.py
